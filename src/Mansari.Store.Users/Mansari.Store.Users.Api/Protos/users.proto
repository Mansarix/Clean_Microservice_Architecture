syntax = "proto3";

option csharp_namespace = "Mansari.Store.Users.Api.Protos";

package mansari.store.users.v1;

import "google/protobuf/timestamp.proto";

service Users {
  rpc GetUserById(GetUserByIdRequest) returns (UserResponse);
  rpc GetUsers(GetUsersRequest) returns (UsersResponse);
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

enum Gender {
  GENDER_UNKNOWN = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
  GENDER_OTHER = 3;
}

message GetUserByIdRequest {
  string id = 1;
}

message GetUsersRequest {
  string search = 1;
  int32 page_number = 2;
  int32 page_size = 3;
  optional bool only_active = 4;
}

message UserResponse {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string full_name = 4;
  string national_id = 5;
  string mobile_number = 6;
  string username = 7;
  string email = 8;
  google.protobuf.Timestamp birth_date = 9;
  Gender gender = 10;
  bool is_active = 11;
  string notes = 12;
  google.protobuf.Timestamp created_at_utc = 13;
  optional google.protobuf.Timestamp updated_at_utc = 14;
  optional google.protobuf.Timestamp deleted_at_utc = 15;
}

message UsersResponse {
  repeated UserResponse items = 1;
  int32 page_number = 2;
  int32 page_size = 3;
  int32 total_count = 4;
}

message CreateUserRequest {
  string first_name = 1;
  string last_name = 2;
  string national_id = 3;
  string mobile_number = 4;
  string username = 5;
  string email = 6;
  google.protobuf.Timestamp birth_date = 7;
  Gender gender = 8;
  optional bool is_active = 9;
  string notes = 10;
}

message UpdateUserRequest {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string national_id = 4;
  string mobile_number = 5;
  string username = 6;
  string email = 7;
  google.protobuf.Timestamp birth_date = 8;
  Gender gender = 9;
  bool is_active = 10;
  string notes = 11;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}
